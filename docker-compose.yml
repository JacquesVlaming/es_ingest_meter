services:

  # One-shot: measure ingest and exit
  meter:
    build:
      context: .
      dockerfile: Dockerfile.meter
    image: es-ingest-meter
    environment:
      ES_HOST:     ${ES_HOST}
      ES_API_KEY:  ${ES_API_KEY:-}
      ES_USERNAME: ${ES_USERNAME:-}
      ES_PASSWORD: ${ES_PASSWORD:-}
    command: >
      --host ${ES_HOST}
      ${ES_API_KEY:+--api-key} ${ES_API_KEY:-}
      --days ${DAYS:-30}

  # Scheduled: ingest synthetic data every 24h
  ingest-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    image: es-ingest-scheduler
    restart: unless-stopped
    environment:
      ES_HOST:        ${ES_HOST}
      ES_API_KEY:     ${ES_API_KEY:-}
      ES_USERNAME:    ${ES_USERNAME:-}
      ES_PASSWORD:    ${ES_PASSWORD:-}
      TARGET_MB:      ${TARGET_MB:-10}
      DOC_SIZE_KB:    ${DOC_SIZE_KB:-1}
      BATCH_SIZE:     ${BATCH_SIZE:-500}
      INTERVAL_HOURS: ${INTERVAL_HOURS:-24}
      KEEP_INDEX:     ${KEEP_INDEX:-}
