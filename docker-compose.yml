services:

  # One-shot: measure ingest and exit
  meter:
    build:
      context: .
      dockerfile: Dockerfile.meter
    image: es-ingest-meter
    env_file: .env

  # One-shot: inventory data sources, ILM policies, and daily ingest rates
  ilm-inventory:
    build:
      context: .
      dockerfile: Dockerfile.inventory
    image: es-ilm-inventory
    env_file: .env
    volumes:
      - ./output:/output

  # Scheduled: ingest synthetic data every 24h
  ingest-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    image: es-ingest-scheduler
    restart: unless-stopped
    env_file: .env
